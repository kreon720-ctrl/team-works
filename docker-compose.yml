services:
  db:
    image: postgres:18
    container_name: postgres-db
    environment:
      POSTGRES_USER: teamworks-manager
      POSTGRES_PASSWORD: 'Nts123!@#'
      POSTGRES_DB: teamworks
    volumes:
      - ~/postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - teamworks-net

  backend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      # 자료실 첨부파일 — 운영 전환 시 STORAGE_BACKEND=s3 토글 + 본 mount 제거.
      - ./files:/app/files
    env_file:
      - ./backend/.env.local
    environment:
      DATABASE_URL: postgresql://teamworks-manager:Nts123%21%40%23@postgres-db:5432/teamworks
      # 브라우저가 보는 외부 base URL — .env 의 PUBLIC_BASE_URL 로 override.
      # CORS Allow-Origin 에 사용되므로 스킴·포트까지 정확히 일치해야 함.
      # (예: 로컬 http://localhost:8080 / Cloudflare 터널 https://teamworks.my)
      FRONTEND_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      NODE_ENV: development
      # 자료실 storage 어댑터 — 1단계 local, 운영 전환 시 's3' 로 변경.
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: /app/files
    command: sh -c "npm install && npm run dev"
    networks:
      - teamworks-net
    expose:
      - "3000"
    depends_on:
      - db

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      # 브라우저가 보는 API base URL — Next.js 빌드 시 client bundle 에 인라인됨.
      # .env 의 PUBLIC_BASE_URL 로 override (스킴·포트 포함 전체 URL).
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      # AI 어시스턴트 schedule_query/schedule_create 가 백엔드 schedule API 를 직접 호출
      BACKEND_URL: http://backend:3000
      RAG_SERVER_URL: http://host.docker.internal:8787
      # 일반 질문 경로 — Open WebUI (컨테이너 네트워크 내부)
      OPEN_WEBUI_BASE_URL: http://open-webui:8080
      OPEN_WEBUI_API_KEY: ${OPEN_WEBUI_API_KEY:-}
      # 채팅 모델 자동 해석은 Ollama /api/ps (메모리 로드된 모델) 기준.
      # 운영자는 ollama run <모델> 로 1개만 띄우면 그 모델이 Open WebUI 호출에 사용됨.
      # 디스크에 여러 모델 설치돼 있어도 OK — 메모리 로드 1개 룰만 지키면 됨.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # OPEN_WEBUI_MODEL: 강제 override (escape hatch). 명시 시 자동 해석 우회.
      OPEN_WEBUI_MODEL: ${OPEN_WEBUI_MODEL:-}
      # 자체 호스팅 Whisper STT — 모바일/데스크톱 동일 엔진 보장 (Web Speech API quirk 우회)
      WHISPER_URL: http://whisper:9000
      # Open WebUI 응답엔 URL 이 빠져 있어 SearxNG 를 직접 호출해 sources 보강
      SEARXNG_BASE_URL: http://searxng:8080
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
    # Turbopack dev 캐시(.next) 가 컨테이너 재시작에서 살아남아 라우트 매니페스트가
    # 깨진 채 부팅되는 사례 발견 — 매 부팅마다 .next 를 비워 클린 컴파일 강제.
    command: sh -c "npm install && rm -rf .next && npm run dev"
    networks:
      - teamworks-net
    expose:
      - "3001"
    depends_on:
      - backend
      - open-webui

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - teamworks-net

  searxng:
    image: searxng/searxng:latest
    container_name: teamworks-searxng
    volumes:
      - ./docker/searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      BASE_URL: http://searxng:8080/
      INSTANCE_NAME: teamworks-searxng
    expose:
      - "8080"
    networks:
      - teamworks-net
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: teamworks-open-webui
    ports:
      - "8081:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY:-change-me-in-env}
      WEBUI_AUTH: "true"
      ENABLE_API_KEY: "true"   # 사용자 설정 → 계정 → API 키 섹션 노출
      # 채팅 기본 모델은 명시하지 않음 — 운영자가 Ollama 에 띄운 모델을 Open WebUI 가
      # 자동 import. 첫 채팅 시 admin 이 드롭다운에서 선택하면 LocalStorage 저장.
      # 강제 지정이 필요하면 .env 에 OPEN_WEBUI_MODEL=<태그> 추가 (frontend 가 우선 사용).
      ENABLE_RAG_WEB_SEARCH: "true"
      RAG_WEB_SEARCH_ENGINE: searxng
      RAG_WEB_SEARCH_RESULT_COUNT: "5"
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: "3"
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>&format=json"
      # v0.9 부터 web search 가 사용자 권한으로 분리됨 — 기본 user 에게도 허용
      USER_PERMISSIONS_FEATURES_WEB_SEARCH: "true"
      # 페이지 본문 fetch 우회 — SearxNG snippet 만 모델에 전달.
      # JS 렌더링 사이트(AccuWeather/기상청/뉴스)는 정적 HTML 에 메뉴만 있어 fetch 노이즈 ↑.
      # snippet(~120~200자) 에 실제 데이터가 있는 케이스가 많고 fetch 비용도 크므로 우회.
      ENABLE_RAG_LOCAL_WEB_FETCH: "false"
      BYPASS_WEB_SEARCH_WEB_LOADER: "true"
      # 임베딩·청킹 우회 — snippet 자체가 짧아 청킹하면 정보 손실. snippet 전체를 모델 컨텍스트로 직접 주입.
      BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL: "true"
      BYPASS_EMBEDDING_AND_RETRIEVAL: "true"
      # 호스트 Ollama 의 nomic-embed-text 를 임베딩에 재사용 — HF 다운로드 회피
      RAG_EMBEDDING_ENGINE: ollama
      RAG_OLLAMA_BASE_URL: http://host.docker.internal:11434
      RAG_EMBEDDING_MODEL: nomic-embed-text:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng
    networks:
      - teamworks-net
    restart: unless-stopped

  # 자체 호스팅 Whisper (OpenAI 오픈소스 STT) — 모바일/데스크톱 STT 엔진 통일.
  # 첫 부팅 시 ASR_MODEL 자동 다운로드 → whisper_cache 볼륨에 영속 저장 (재기동 시 재다운로드 X).
  # 기본은 CPU 이미지 (Mac dev 호환) — 운영 GPU 환경은 image 를 :latest-gpu 로 swap + nvidia runtime 설정.
  # 모델 선택 가이드 (faster_whisper 엔진 + CT2 양자화 기준):
  #   - tiny           ~120MB   한국어 보통       초저사양 폴백
  #   - base           ~250MB   한국어 양호       CPU 빠른 응답 (~1-2초)
  #   - small          ~600MB   한국어 우수       균형
  #   - medium         ~1.5GB   한국어 매우 우수
  #   - large-v3-turbo ~1GB     한국어 최고       large-v3 와 동급 정확도, 5배 빠름 ★권장
  #   - large-v3       ~3GB     한국어 최고       정확도는 turbo 와 비슷
  #
  # 한국어 특화: 위 표준 모델 외에 HuggingFace 의 한국어 fine-tuned 모델 사용 가능.
  # 예: ASR_MODEL=ghost613/whisper-large-v3-turbo-korean (Zeroth-Korean·KsponSpeech 학습)
  # 단, 모델이 CT2 (CTranslate2) 형식이어야 faster_whisper 가 직접 로드 가능.
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: teamworks-whisper
    expose:
      - "9000"
    environment:
      # small + faster_whisper — 다운로드 안정성 우선 (회선 이슈로 large/medium 1GB+ 받기 실패 빈번).
      # CT2 양자화로 이전 openai_whisper small 대비 메모리 절반 + 미세하게 빠름.
      # 회선·HF mirror 안정한 환경에선 .env 의 WHISPER_MODEL 로 large-v3-turbo / medium 으로 업그레이드.
      ASR_MODEL: ${WHISPER_MODEL:-small}
      ASR_ENGINE: ${WHISPER_ENGINE:-faster_whisper}
      # HF Hub 의 새 xet storage backend 가 일부 환경에서 TLS 연결 끊김 → 모델 다운로드 실패.
      # 안정적인 git-LFS 방식으로 폴백.
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - whisper_cache:/root/.cache/whisper
    networks:
      - teamworks-net
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
  open_webui_data:
  whisper_cache:

networks:
  teamworks-net:
    name: teamworks-net
    external: true
